<!DOCTYPE html>

<body class="bg-slate-50 text-slate-900">

    <!-- Navbar -->

        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2">

            <h3 class="text-2xl font-black text-navyDark mb-6">قنوات الاتصال المباشر</h3>
            <!-- الهاتف الجديد المحدث -->
            <div class="flex items-center gap-4 p-5 bg-white rounded-xl shadow-sm border border-slate-200">

                    <span class="font-bold text-navyDark text-lg" dir="ltr">01000468349</span>
                </div>
            </div>
            <!-- زر الواتساب الكبير المباشر -->
            <a href="https://wa.me/201000468349" target="_blank" class="flex items-center gap-4 p-5 bg-green-50 hover:bg-green-100 rounded-xl shadow-sm border border-green-200 transition cursor-pointer">

            <div>
                <input type="text" placeholder="الاسم الكامل" class="w-full p-3 rounded-lg border border-slate-300 text-sm" required>

            <button type="submit" class="w-full bg-gradient-to-r from-amber-500 to-goldLuxury text-navyDark py-3 rounded-lg font-bold transition">إرسال الطلب</button>

    <footer class="bg-navyDark text-slate-400 py-8 text-center">
        <p class="text-xs">جميع الحقوق محفوظة &copy; 2026 شركة الأسطورة.</p>
