backend:
  name: github
  repo: abdelrhmanezzat1/Alostora
  branch: main
  auth_type: implicit

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "events"
    label: "المعارض والمؤتمرات القادمة"
    folder: "data/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان المعرض/المؤتمر", name: "title", widget: "string" }
      - { label: "تاريخ البدء والوقت", name: "date", widget: "datetime" }
      - { label: "مقر الفعالية والمدينة", name: "location", widget: "string" }
      - { label: "صورة الغلاف والبنر", name: "image", widget: "image" }
      - { label: "التفاصيل والأجندة بالكامل", name: "body", widget: "markdown" }
