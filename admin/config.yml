backend:
  name: github
  repo: abdelrhman ezzat1/Alostora # ⚠️ استبدل YOUR_GITHUB_USERNAME باسم حسابك في جيتهاب بدقة
  branch: main

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "events"
    label: "المعارض والمؤتمرات القادمة"
    folder: "data/events"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "عنوان المعرض/المؤتمر", name: "title", widget: "string" }
      - { label: "تاريخ البدء والوقت", name: "date", widget: "datetime" }
      - { label: "مقر الفعالية والمدينة", name: "location", widget: "string" }
      - { label: "صورة الغلاف والبنر", name: "image", widget: "image" }
      - { label: "التفاصيل والأجندة بالكامل", name: "body", widget: "markdown" }

  - name: "services"
    label: "إدارة الخدمات الأساسية"
    folder: "data/services"
    create: true
    fields:
      - { label: "اسم الخدمة للشركة", name: "title", widget: "string" }
      - { label: "أيقونة الخدمة (FontAwesome)", name: "icon", widget: "string" }
      - { label: "شرح مفصل للخدمة", name: "description", widget: "text" }
